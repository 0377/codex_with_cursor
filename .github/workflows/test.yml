name: test

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  pytest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: python -m pip install pytest
      - name: Run tests (exclude pwsh-only)
        run: python -m pytest tests -q -m "not requires_pwsh"

  pytest-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: python -m pip install pytest
      - name: Run all tests
        run: python -m pytest tests -q
